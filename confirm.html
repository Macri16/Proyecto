<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cuenta confirmada – marketcorp.org</title>
  <script src="assets/config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a1a;
      font-family: system-ui, sans-serif;
      color: #fff;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 48px 40px;
      text-align: center;
      max-width: 420px;
      width: 90%;
    }
    .icon { font-size: 3rem; margin-bottom: 16px; }
    h1 { font-size: 1.6rem; margin-bottom: 12px; }
    p { color: rgba(255,255,255,0.6); margin-bottom: 28px; line-height: 1.5; }
    .counter { font-size: 0.9rem; color: rgba(255,255,255,0.4); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>¡Correo confirmado!</h1>
    <p>Tu cuenta ha sido verificada exitosamente.<br>En un momento te redirigimos al área de clientes.</p>
    <p class="counter">Redirigiendo en <span id="s">3</span>s…</p>
  </div>

  <script>
    let n = 3;
    const el = document.getElementById("s");
    const iv = setInterval(() => {
      n--;
      el.textContent = n;
      if (n <= 0) {
        clearInterval(iv);
        window.location.href = "/client.html";
      }
    }, 1000);
  </script>
</body>
</html>
