<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>marketcorp.org — Acceso</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0a0c12;--surface:#111420;--border:rgba(255,255,255,.08);
      --text:#f0f2ff;--muted:#9ca3af;--blue:#3b5bff;--red:#f43f5e;--radius:16px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"DM Sans",sans-serif;background:radial-gradient(900px 520px at 12% 8%,rgba(59,91,255,.18),transparent 55%),var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px}
    .card{width:min(520px,100%);background:rgba(17,20,32,.9);border:1px solid var(--border);border-radius:var(--radius);padding:26px 22px;backdrop-filter:blur(10px)}
    h1{font-family:"Syne",sans-serif;font-size:28px;letter-spacing:.2px;margin-bottom:8px}
    p{color:var(--muted);margin-bottom:18px;line-height:1.55}
    label{display:block;font-size:12px;color:var(--muted);margin:12px 0 6px}
    input{width:100%;padding:14px 12px;border-radius:12px;border:1px solid var(--border);background:#0d1020;color:var(--text);outline:none}
    .row{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
    button{flex:1;min-width:160px;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-weight:600}
    .primary{background:var(--blue);border-color:transparent}
    .hint{margin-top:12px;font-size:12px;color:var(--muted)}
    .msg{margin-top:12px;font-size:13px;line-height:1.5;border-radius:12px;padding:10px 12px;border:1px solid var(--border);display:none}
    #error{border-color:rgba(244,63,94,.35);background:rgba(244,63,94,.08)}
    #ok{border-color:rgba(59,91,255,.35);background:rgba(59,91,255,.08)}
    #busy{display:none;margin-top:12px;color:var(--muted);font-size:12px}
    a{color:#b9c3ff}
  </style>
</head>
<body>
  <main class="card">
    <h1>Acceso</h1>
    <p>Inicia sesión para entrar al área de clientes. Si no tienes cuenta, créala en 10 segundos.</p>

    <form id="loginForm">
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="email" placeholder="tu@email.com" required />

      <label for="password">Contraseña</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" required />

      <div class="row">
        <button id="btnSignIn" class="primary" type="submit">Entrar</button>
        <button id="btnSignUp" type="button">Crear cuenta</button>
      </div>
    </form>

    <div id="busy">Procesando…</div>
    <div id="error" class="msg"></div>
    <div id="ok" class="msg"></div>

    <div class="hint">
      ¿Problemas? Verifica que exista `assets/config.js` (copia desde `assets/config.example.js`).<br/>
      Volver a la landing: <a href="./index.html">inicio</a>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="./assets/config.js"></script>
  <script src="./assets/supabase-client.js"></script>
  <script src="./assets/app.js"></script>
  <script>window.__initLoginPage();</script>
</body>
</html>
