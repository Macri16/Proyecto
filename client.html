<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>marketcorp.org — Área de Clientes</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0c12;
      --surface: #111420;
      --surface2: #171b28;
      --border: rgba(255,255,255,0.07);
      --blue: #3b5bff;
      --blue-light: #6b83ff;
      --text: #f0f2ff;
      --text-muted: #6b7280;
      --green: #22d3a0;
      --amber: #f59e0b;
      --red: #f43f5e;
      --radius: 14px;
      --sidebar: 240px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    a { color: inherit; text-decoration: none; }

    .layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: var(--sidebar);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      position: fixed; height: 100vh; z-index: 100;
      padding: 22px 0 18px;
    }
    .logo { display:flex;align-items:center;gap:10px;padding:0 22px 18px;border-bottom:1px solid var(--border); }
    .mark { width: 34px; height: 34px; border-radius: 10px; background:
      radial-gradient(circle at 30% 30%, rgba(107,131,255,.65), transparent 55%),
      linear-gradient(135deg, rgba(59,91,255,.9), rgba(59,91,255,.15));
      box-shadow: 0 10px 30px rgba(59,91,255,.25);
      border: 1px solid rgba(255,255,255,.12);
    }
    .brand { line-height:1.1; }
    .brand strong { font-family:'Syne',sans-serif; letter-spacing:.2px; font-size: 14px; display:block;}
    .brand span { font-size: 12px; color: var(--text-muted); }
    .nav { padding: 14px 10px; display:flex; flex-direction:column; gap: 8px; }
    .nav a { padding: 10px 12px; border-radius: 12px; color: var(--text-muted); border: 1px solid transparent; }
    .nav a.active { background: rgba(59,91,255,.12); color: var(--text); border-color: rgba(59,91,255,.22); }
    .nav a:hover { background: rgba(255,255,255,.03); color: var(--text); }

    .sidebar-footer { margin-top:auto; padding: 0 14px; }
    .btn { width:100%; padding: 10px 12px; border-radius: 12px; border:1px solid var(--border); background: transparent; color: var(--text); cursor:pointer; font-weight:600; }
    .btn:hover{ border-color: rgba(255,255,255,.16); }

    .main { margin-left: var(--sidebar); width: calc(100% - var(--sidebar)); padding: 26px 26px 34px; }
    .topbar { display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px; }
    .topbar h1{font-family:'Syne',sans-serif;font-size:28px;letter-spacing:.2px}
    .pill { padding: 8px 10px; border-radius: 999px; border:1px solid var(--border); color: var(--text-muted); font-size: 12px; }
    .grid { display:grid; grid-template-columns: 1.1fr .9fr; gap: 14px; align-items:start; }
    .card { background: var(--surface2); border:1px solid var(--border); border-radius: var(--radius); padding: 16px; }
    .card h2 { font-size: 14px; letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .stat { padding: 10px 12px; border-radius: 12px; background: rgba(255,255,255,.03); border:1px solid var(--border); }
    .stat b { display:block; font-size: 14px; }
    .stat span { font-size: 12px; color: var(--text-muted); }

    form.pay { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-top: 8px; }
    input.money { flex: 1; min-width: 180px; padding: 12px 12px; border-radius: 12px; border:1px solid var(--border); background: #0d1020; color: var(--text); outline:none; }
    button.primary { padding: 12px 14px; border-radius: 12px; border: 1px solid transparent; background: var(--blue); color: #fff; cursor:pointer; font-weight:700; }
    button.primary:hover{ filter: brightness(1.05); }
    .msg { margin-top:10px; color: var(--red); font-size: 13px; display:none; }

    ul.list { list-style:none; display:flex; flex-direction:column; gap:8px; }
    ul.list li { padding: 10px 12px; border-radius: 12px; border:1px solid var(--border); background: rgba(255,255,255,.02); }
    ul.list a { color: var(--blue-light); }

    #loading { padding: 26px; color: var(--text-muted); }
    @media (max-width: 900px){
      .grid{ grid-template-columns: 1fr; }
      .sidebar{ position: static; width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
      .main{ margin-left: 0; width: 100%; }
    }
  </style>
</head>
<body>
  <div id="loading">Cargando tu panel…</div>
  <div id="page" style="display:none">
    <div class="layout">
      <aside class="sidebar">
        <div class="logo">
          <div class="mark"></div>
          <div class="brand">
            <strong>marketcorp.org</strong>
            <span>Área de clientes</span>
          </div>
        </div>
        <nav class="nav">
          <a class="active" href="./client.html">Dashboard</a>
          <a id="adminLink" href="./admin.html" style="display:none">Admin</a>
          <a href="./index.html">Landing</a>
        </nav>
        <div class="sidebar-footer">
          <button class="btn" id="btnLogout">Cerrar sesión</button>
        </div>
      </aside>

      <main class="main">
        <div class="topbar">
          <h1>Dashboard</h1>
          <div class="pill"><span id="userEmail">—</span></div>
        </div>

        <div class="grid">
          <section class="card">
            <h2>Estado</h2>
            <div class="row">
              <div class="stat">
                <b id="accessStatus">—</b>
                <span>Acceso</span>
              </div>
              <div class="stat">
                <b>Pagos</b>
                <span>Activa tu acceso si aún no está habilitado</span>
              </div>
            </div>

            <form id="payForm" class="pay">
              <input id="amount" class="money" type="number" step="0.01" min="0" placeholder="Monto (ej: 49.00)" />
              <button class="primary" type="submit">Pagar y activar</button>
            </form>
            <div id="payError" class="msg"></div>
          </section>

          <section class="card">
            <h2>Descargas</h2>
            <ul id="downloads" class="list">
              <li>Cargando…</li>
            </ul>
          </section>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="./assets/config.js"></script>
  <script src="./assets/supabase-client.js"></script>
  <script src="./assets/app.js"></script>
  <script>window.__initClientPage();</script>
</body>
</html>
